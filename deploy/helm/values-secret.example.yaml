# Copy to values-secret.yaml (gitignored) before `make deploy`.
# `make deploy` runs validate_secrets.py: do not use null or empty strings for required fields below.
# Install PyYAML if needed: python3 -m pip install pyyaml
secrets:
  model:
    apiKey: "sk-proj-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    endpoint: "https://api.openai.com"
    # Optional overrides (empty = use endpoint / apiKey for both):
    # simpleEndpoint: "https://..."
    # complexEndpoint: "https://..."
    # simpleApiKey: ""
    # complexApiKey: ""
    complexModelName: "gpt-5"
    simpleModelName: "gpt-4.1"
  redis:
    url: "redis://localhost:6379"
