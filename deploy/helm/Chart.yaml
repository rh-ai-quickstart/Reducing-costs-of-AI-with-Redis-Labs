apiVersion: v2
name: redis-notebook
description: >-
  OpenShift AI Notebook with Redis for the cost-reduction demo: Redis Enterprise Operator
  (REC + REDB, default), OT-CONTAINER-KIT operator + Redis CR, or external Redis URL;
  git-clones demo notebooks.
type: application
version: 0.1.0
appVersion: "1.0"
keywords:
  - openshift
  - openshift-ai
  - jupyter
  - redis
  - redis-stack
home: https://github.com/rh-ai-quickstart/Reducing-costs-of-AI-with-Redis-Labs
maintainers:
  - name: Red Hat AI Quickstart Team
dependencies:
  - name: redis-operator
    version: 0.24.0
    repository: https://ot-container-kit.github.io/helm-charts/
    condition: redis.useOtContainerKitOperator
  - name: redis
    alias: redisData
    version: 0.16.9
    repository: https://ot-container-kit.github.io/helm-charts/
    condition: redis.useOtContainerKitOperator
