nameOverride: ""
fullnameOverride: ""

global:
  openshift: true
  clusterDomain: cluster.local

# Redis for notebooks: pick one primary path.
#
# 1) Redis Enterprise Operator (REC + REDB) — DEFAULT: redis.useRedisEnterpriseOperator: true.
#    OLM for redis-enterprise-operator-cert is OFF by default (redis.enterprise.olm.enabled).
#    Install the operator from OperatorHub into this namespace first, or use
#    `make ... deploy-all` (Redis Enterprise OLM).
#    The chart always creates RedisEnterpriseCluster + RedisEnterpriseDatabase CRs when
#    useRedisEnterpriseOperator is true and wires the notebook to the operator-generated
#    DB password Secret once the operator reconciles them.
#
# 2) OT-CONTAINER-KIT operator + Redis CR: set redis.useOtContainerKitOperator: true
#    (and redis.useRedisEnterpriseOperator: false), run `make -f deploy/helm/Makefile deps`,
#    see deploy/README.md for admin notes.
#
# 3) External only: both operator flags false, set secrets.redis.url to your broker URL.
redis:
  useOtContainerKitOperator: false
  useRedisEnterpriseOperator: true

  # Skip the friendly preflight that fails fast when the redis-enterprise CRDs
  # (app.redislabs.com/v1, .../v1alpha1) are not present in the cluster's API
  # server. Leave false for real installs/upgrades. Set true for `helm lint`
  # or `helm template` runs that don't pass --api-versions, to suppress the
  # preflight noise without losing the safety check at deploy time.
  skipCapabilityCheck: false

  # Redis Enterprise (REC + REDB) — only used when useRedisEnterpriseOperator: true.
  enterprise:
    cluster:
      name: rec
      nodes: 3
      # Per-node resources for the Redis Enterprise pods (statefulset created by REC).
      redisEnterpriseNodeResources:
        limits:
          cpu: "2000m"
          memory: 4Gi
        requests:
          cpu: "1000m"
          memory: 4Gi
      persistentSpec:
        enabled: true
        storageClassName: ""
        volumeSize: 10Gi
      # Optional override of the cluster image registry/repos. Defaults below
      # match the Red Hat–certified images shipped with the OperatorHub package.
      bootstrapperImageSpec:
        repository: registry.connect.redhat.com/redislabs/redis-enterprise-operator
      redisEnterpriseImageSpec:
        repository: registry.connect.redhat.com/redislabs/redis-enterprise
      redisEnterpriseServicesRiggerImageSpec:
        repository: registry.connect.redhat.com/redislabs/services-manager
    database:
      name: redb
      memorySize: 256MB
      shardCount: 1
      replication: true
      # Redis Enterprise auto-creates a Secret named "redb-<database.name>" with
      # keys: password, port, service_names. Override only if your operator
      # version uses a different naming convention.
      passwordSecretName: ""

    # OLM install for Redis Enterprise (certified-operators). Default false so a plain
    # `make deploy` does not modify OLM; use `make deploy-all` or set enabled: true.
    # Set createOperatorGroup: false if this namespace already has an OperatorGroup.
    olm:
      enabled: false
      createOperatorGroup: true
      operatorGroupName: redis-enterprise-operator-group
      skipCapabilityCheck: false
      subscription:
        name: redis-enterprise-operator-cert
        channel: production
        installPlanApproval: Automatic
        source: certified-operators
        sourceNamespace: openshift-marketplace

redis-operator:
  redisOperator:
    watchNamespace: ""

redisData:
  redisStandalone:
    name: ""
  storageSpec:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

notebook:
  enabled: true
  username: "admin"

  # Workbench delivery mode:
  #   "Deployment" (default) — plain Deployment + Service + Route. Works on any
  #     OpenShift cluster; no RHOAI / ODH notebook-controller required.
  #   "Notebook"             — Kubeflow `kubeflow.org/v1` Notebook CR. Requires
  #     RHOAI (or upstream ODH notebook-controller) and gives you the dashboard
  #     workbench experience with OAuth-proxy auth injected by the controller.
  kind: "Notebook"

  image:
    # Public ODH minimal CPU workbench (Py 3.12): works on any OpenShift cluster
    # without RHOAI image streams or internal-registry pull secrets.
    #
    # To use an ImageStream in redhat-ods-applications from another namespace,
    # grant system:image-puller on that namespace to this chart's ServiceAccount,
    # then set repository/tag to the internal registry reference.
    # Quay does not publish :latest for this repo; pin a tag (see quay.io/.../tag/).
    repository: quay.io/opendatahub/odh-workbench-jupyter-minimal-cpu-py312-ubi9
    tag: "d2bb960fba2b235b84771e182ea67809570afdf0"
    pullPolicy: IfNotPresent

  # RHOAI / ODH workbenches may set PIP_INDEX_URL to a curated index without redisvl.
  # PIP_EXTRA_INDEX_URL lets pip fall back to PyPI for missing packages. Set to ""
  # for air-gapped installs (bake deps into a custom image instead).
  pipExtraIndexUrl: "https://pypi.org/simple"

  resources:
    limits:
      cpu: "2"
      memory: "8Gi"
    requests:
      cpu: "1"
      memory: "4Gi"

  storage:
    size: 20Gi
    storageClassName: ""

  # Browser auth for the Deployment-mode notebook. Empty token = no auth (matches
  # the existing Notebook-CR posture, which relies on the OAuth proxy). Set to a
  # non-empty string to require it as a query param / header. Ignored when
  # kind=Notebook (RHOAI's OAuth proxy handles auth there).
  auth:
    token: ""

  # OpenShift Route for browser access in Deployment mode. Ignored when
  # kind=Notebook (the notebook-controller creates its own Route).
  route:
    enabled: true
    host: ""

  gitSync:
    enabled: true
    # Replace demo/ on pod restart when true (default: skip if demo/notebooks exists).
    forceRefresh: true
    repo: "https://github.com/rh-ai-quickstart/Reducing-costs-of-AI-with-Redis-Labs.git"
    branch: "main"
    image: "alpine/git:latest"

# ROI / Request Journey Streamlit dashboard (optional companion to the notebook).
# Five tabs: 00 UI Guide, 01 Readiness, 02 Complex Agent, 03 Router & Cache, 04 Production Queue.
# Uses its own PVC so it can run alongside the notebook workload.
# Point gitSync.repo at your fork/branch until demo/app.py is on main.
roiDashboard:
  enabled: true

  # When true, complex claims skip LangGraph tool-calling and use Redis pre-fetch +
  # a single chat completion. Required for most LiteLLM / MaaS gateways that do not
  # expose --enable-auto-tool-choice on the model server.
  plainComplex: true

  # Per-stage animation delay (unused by simplified chat UI; kept for compatibility).
  journeyStageDelayMs: "400"

  image:
    repository: python
    tag: "3.12-slim"
    pullPolicy: IfNotPresent

  # Rely on PyPI for streamlit + demo deps at pod start (see deployment command).
  # Set to "" for air-gapped installs (bake deps into a custom image instead).
  pipExtraIndexUrl: "https://pypi.org/simple"

  resources:
    limits:
      cpu: "1"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"

  # Workspace PVC (shared claim name with notebook; created when either is enabled).
  storage:
    size: 10Gi
    storageClassName: ""

  route:
    enabled: true
    host: ""
    path: ""

  gitSync:
    enabled: true
    forceRefresh: false
    repo: "https://github.com/rh-ai-quickstart/Reducing-costs-of-AI-with-Redis-Labs.git"
    branch: "rj_redis_ui"
    image: "alpine/git:latest"

  # Default token pricing ($ per 1M tokens) for the comparison dashboard sidebar.
  modelPricing:
    simple:
      inputPerMillion: 0.15
      outputPerMillion: 0.60
    complex:
      inputPerMillion: 2.50
      outputPerMillion: 10.00

# Redis Agent Kit worker for Tab 4 (Production Queue). Consumes the same Redis
# Streams queue as the Streamlit UI submitter. Uses emptyDir + git-sync so it
# can run alongside the dashboard without sharing a ReadWriteOnce PVC.
insuranceWorker:
  enabled: true

  replicas: 1
  concurrency: 4
  queueName: insurance

  # Match roiDashboard plain-complex mode (MaaS gateways without tool-calling).
  plainComplex: true

  image:
    repository: python
    tag: "3.12-slim"
    pullPolicy: IfNotPresent

  pipExtraIndexUrl: "https://pypi.org/simple"

  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "500m"
      memory: "2Gi"

  gitSync:
    enabled: true
    forceRefresh: false
    # Empty repo/branch falls back to roiDashboard.gitSync.* in templates.
    repo: ""
    branch: ""
    image: "alpine/git:latest"
