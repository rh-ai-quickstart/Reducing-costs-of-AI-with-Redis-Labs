nameOverride: ""
fullnameOverride: ""

global:
  openshift: true
  # Used in REDIS_URL when redis.enabled (Kubernetes / OpenShift service DNS).
  clusterDomain: cluster.local

# In-cluster Redis: OT-CONTAINER-KIT redis-operator + Redis standalone (subcharts).
# Run: helm dependency update ./deploy/helm  (or: make -f deploy/helm/Makefile deps)
# Set redis.enabled: false to use an external Redis only (set secrets.redis.url).
redis:
  enabled: true

redis-operator:
  redisOperator:
    # Restrict the operator to this release namespace (recommended on shared clusters).
    # Override at install time, e.g. --set redis-operator.redisOperator.watchNamespace=my-project
    watchNamespace: ""

redisData:
  redisStandalone:
    # If empty, the Redis CR name (and Service DNS name) defaults to the Helm release name.
    name: ""
  storageSpec:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

# Override with deploy/helm/values-secrets.yaml (do not commit real keys).
secrets:
  model:
    apiKey: ""
    endpoint: "https://api.openai.com"
    complexModelName: "gpt-5"
    simpleModelName: "gpt-4.1"
  redis:
    url: "redis://localhost:6379"

notebook:
  enabled: true
  username: "admin"

  image:
    repository: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/tensorflow
    tag: "2025.2"
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: "2"
      memory: "8Gi"
    requests:
      cpu: "1"
      memory: "4Gi"

  storage:
    size: 20Gi
    storageClassName: ""

  gitSync:
    enabled: true
    repo: "https://github.com/rh-ai-quickstart/Reducing-costs-of-AI-with-Redis-Labs.git"
    branch: "redis/robert/ex" # TODO: Change to main
    image: "alpine/git:latest"
