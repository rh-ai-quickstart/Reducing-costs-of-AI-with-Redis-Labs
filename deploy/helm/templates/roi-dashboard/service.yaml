{{- if .Values.roiDashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis-notebook.roiDashboardName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redis-notebook.roiDashboardLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "redis-notebook.roiDashboardSelectorLabels" . | nindent 4 }}
  ports:
    - name: streamlit
      port: 8501
      targetPort: streamlit
      protocol: TCP
{{- end }}
