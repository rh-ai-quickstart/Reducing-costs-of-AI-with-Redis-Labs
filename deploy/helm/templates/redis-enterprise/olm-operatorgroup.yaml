{{- if and .Values.redis.useRedisEnterpriseOperator .Values.redis.enterprise.olm.enabled .Values.redis.enterprise.olm.createOperatorGroup }}
{{- if and (not .Values.redis.enterprise.olm.skipCapabilityCheck) (not (.Capabilities.APIVersions.Has "operators.coreos.com/v1")) }}
{{- fail "redis.enterprise.olm.enabled=true requires operators.coreos.com/v1 (OperatorGroup). This chart targets OpenShift / OLM-enabled clusters. Set redis.enterprise.olm.skipCapabilityCheck=true only for helm lint/template without cluster API metadata." }}
{{- end }}
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: {{ .Values.redis.enterprise.olm.operatorGroupName | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redis-notebook.redisEnterpriseOLMLabels" . | nindent 4 }}
spec:
  targetNamespaces:
    - {{ .Release.Namespace }}
{{- end }}
