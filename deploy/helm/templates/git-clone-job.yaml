{{- if and .Values.notebook.enabled .Values.notebook.gitSync.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "reducing-costs-notebook.fullname" . }}-clone-notebooks
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reducing-costs-notebook.labels" . | nindent 4 }}
    app.kubernetes.io/component: notebook
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-failed
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "reducing-costs-notebook.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: notebook-setup
    spec:
      serviceAccountName: {{ include "reducing-costs-notebook.serviceAccountName" . }}
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-pvc
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              echo "Waiting for PVC to be bound..."
              RETRIES=30
              COUNT=0
              until [ -d /workspace ] && [ -w /workspace ]; do
                COUNT=$((COUNT+1))
                if [ $COUNT -ge $RETRIES ]; then
                  echo "PVC not ready after $RETRIES attempts, giving up"
                  exit 1
                fi
                echo "PVC not yet available, waiting... (attempt $COUNT/$RETRIES)"
                sleep 5
              done
              echo "PVC is ready and writable"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: git-clone
          image: {{ .Values.notebook.gitSync.image }}
          command:
            - sh
            - -c
            - |
              set -e
              cd /workspace

              if [ -d "demo" ]; then
                echo "Removing existing demo folder..."
                rm -rf demo
              fi

              echo "Cloning repository: {{ .Values.notebook.gitSync.repo }}"
              RETRIES=5
              COUNT=0
              until git clone --depth 1 {{ if .Values.notebook.gitSync.branch }}--branch {{ .Values.notebook.gitSync.branch }}{{ end }} {{ .Values.notebook.gitSync.repo }} /tmp/repo; do
                COUNT=$((COUNT+1))
                if [ $COUNT -ge $RETRIES ]; then
                  echo "Failed to clone repository after $RETRIES attempts"
                  echo "This may be due to network issues. You can manually clone the repository later."
                  exit 0
                fi
                echo "Clone failed, retrying in 10 seconds... (attempt $COUNT/$RETRIES)"
                sleep 10
              done

              echo "Copying demo folder to workspace..."
              if [ -d "/tmp/repo/demo" ]; then
                cp -rf /tmp/repo/demo . || {
                  echo "Error: Failed to copy demo folder"
                  exit 1
                }
                if [ ! -d "demo" ]; then
                  echo "Error: Demo folder not found after copy"
                  exit 1
                fi
                echo "Demo folder successfully copied to workspace"
              else
                echo "Error: No demo directory found in repository"
                exit 1
              fi

              rm -rf /tmp/repo
              echo "Clone completed successfully"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "reducing-costs-notebook.fullname" . }}-notebook-pvc
{{- end }}
