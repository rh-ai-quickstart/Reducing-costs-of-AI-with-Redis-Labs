{{- if and .Values.notebook.enabled (eq .Values.notebook.kind "Notebook") }}
{{- if not (.Capabilities.APIVersions.Has "kubeflow.org/v1/Notebook") }}
{{- fail "notebook.kind=\"Notebook\" requires the kubeflow.org/v1 Notebook CRD provided by Red Hat OpenShift AI (RHOAI) or upstream Open Data Hub. Install RHOAI / ODH notebook-controller into the cluster, or set notebook.kind=\"Deployment\" to use a plain Deployment + Route instead." }}
{{- end }}
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: {{ include "redis-notebook.fullname" . }}-notebook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redis-notebook.labels" . | nindent 4 }}
    app.kubernetes.io/component: notebook
    opendatahub.io/dashboard: "true"
    opendatahub.io/odh-managed: "true"
  annotations:
    notebooks.opendatahub.io/inject-auth: "true"
    opendatahub.io/username: {{ .Values.notebook.username | default "admin" | quote }}
    helm.sh/hook-weight: "0"
spec:
  template:
    spec:
      serviceAccountName: {{ include "redis-notebook.serviceAccountName" . }}
{{- if and .Values.notebook.gitSync.enabled }}
      initContainers:
        - name: git-sync-demo
          image: {{ .Values.notebook.gitSync.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: GIT_SYNC_FORCE
              value: {{ if .Values.notebook.gitSync.forceRefresh }}"true"{{ else }}"false"{{ end }}
          command:
            - sh
            - -c
            - |
              set -e
              cd /opt/app-root/src
              if [ "$GIT_SYNC_FORCE" != "true" ] && [ -d demo/notebooks ]; then
                echo "demo/notebooks already present; skipping git sync (set notebook.gitSync.forceRefresh=true to replace)."
                exit 0
              fi
              if [ "$GIT_SYNC_FORCE" = "true" ] && [ -d demo ]; then
                echo "Removing existing demo folder (forceRefresh)..."
                rm -rf demo
              fi
              echo "Cloning repository: {{ .Values.notebook.gitSync.repo }}"
              RETRIES=5
              COUNT=0
              until git clone --depth 1 {{ if .Values.notebook.gitSync.branch }}--branch {{ .Values.notebook.gitSync.branch }}{{ end }} {{ .Values.notebook.gitSync.repo }} /tmp/repo; do
                COUNT=$((COUNT+1))
                if [ $COUNT -ge $RETRIES ]; then
                  echo "Failed to clone repository after $RETRIES attempts"
                  exit 1
                fi
                echo "Clone failed, retrying in 10 seconds... (attempt $COUNT/$RETRIES)"
                sleep 10
              done
              echo "Copying demo folder to workspace..."
              if [ -d "/tmp/repo/demo" ]; then
                cp -rf /tmp/repo/demo . || { echo "Error: Failed to copy demo folder"; exit 1; }
                if [ ! -d "demo/notebooks" ]; then
                  echo "Error: demo/notebooks missing after copy"
                  exit 1
                fi
                echo "Demo folder successfully copied to workspace"
              else
                echo "Error: No demo directory found in repository"
                exit 1
              fi
              rm -rf /tmp/repo
              echo "Git sync completed successfully"
          volumeMounts:
            - name: workspace
              mountPath: /opt/app-root/src
{{- end }}
      containers:
        - name: {{ include "redis-notebook.fullname" . }}-notebook
          image: {{ .Values.notebook.image.repository }}:{{ .Values.notebook.image.tag }}
          imagePullPolicy: {{ .Values.notebook.image.pullPolicy }}
          workingDir: /opt/app-root/src
          env:
            - name: NOTEBOOK_ARGS
              value: >-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/{{ .Release.Namespace }}/{{ include "redis-notebook.fullname" . }}-notebook
                --ServerApp.quit_button=False
            - name: RESTARTABLE
              value: "yes"
            - name: JUPYTER_IMAGE
              value: {{ .Values.notebook.image.repository }}:{{ .Values.notebook.image.tag }}
            - name: JUPYTER_RUNTIME_DIR
              value: /opt/app-root/src/.jupyter/runtime
            - name: JUPYTER_DATA_DIR
              value: /opt/app-root/src/.jupyter/data
            - name: JUPYTER_CONFIG_DIR
              value: /opt/app-root/src/.jupyter/config
            - name: IPYTHONDIR
              value: /opt/app-root/src/.ipython
            - name: HOME
              value: /opt/app-root/src
            - name: CONDARC
              value: /opt/app-root/src/.condarc
            {{- if .Values.notebook.pipExtraIndexUrl }}
            - name: PIP_EXTRA_INDEX_URL
              value: {{ .Values.notebook.pipExtraIndexUrl | quote }}
            {{- end }}
            - name: MODEL_API_KEY
              value: {{ .Values.secrets.model.apiKey | quote }}
            - name: MODEL_ENDPOINT
              value: {{ .Values.secrets.model.endpoint | quote }}
            - name: SIMPLE_MODEL_ENDPOINT
              value: {{ .Values.secrets.model.simpleEndpoint | default .Values.secrets.model.endpoint | default .Values.secrets.model.complexEndpoint | quote }}
            - name: COMPLEX_MODEL_ENDPOINT
              value: {{ .Values.secrets.model.complexEndpoint | default .Values.secrets.model.endpoint | default .Values.secrets.model.simpleEndpoint | quote }}
            - name: SIMPLE_MODEL_KEY
              value: {{ .Values.secrets.model.simpleApiKey | default .Values.secrets.model.apiKey | quote }}
            - name: COMPLEX_MODEL_KEY
              value: {{ .Values.secrets.model.complexApiKey | default .Values.secrets.model.apiKey | quote }}
            - name: COMPLEX_MODEL_NAME
              value: {{ .Values.secrets.model.complexModelName | quote }}
            - name: SIMPLE_MODEL_NAME
              value: {{ .Values.secrets.model.simpleModelName | quote }}
            - name: REDIS_URL
              value: {{ include "redis-notebook.redisUrl" . | quote }}
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          resources:
            limits:
              cpu: {{ .Values.notebook.resources.limits.cpu | quote }}
              memory: {{ .Values.notebook.resources.limits.memory | quote }}
            requests:
              cpu: {{ .Values.notebook.resources.requests.cpu | quote }}
              memory: {{ .Values.notebook.resources.requests.memory | quote }}
          startupProbe:
            httpGet:
              scheme: HTTP
              path: /notebook/{{ .Release.Namespace }}/{{ include "redis-notebook.fullname" . }}-notebook/api
              port: notebook-port
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 60
          livenessProbe:
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
            httpGet:
              scheme: HTTP
              path: /notebook/{{ .Release.Namespace }}/{{ include "redis-notebook.fullname" . }}-notebook/api
              port: notebook-port
          readinessProbe:
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
            httpGet:
              scheme: HTTP
              path: /notebook/{{ .Release.Namespace }}/{{ include "redis-notebook.fullname" . }}-notebook/api
              port: notebook-port
          volumeMounts:
            - name: workspace
              mountPath: /opt/app-root/src
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "redis-notebook.fullname" . }}-notebook-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
{{- end }}
