{{- if and .Values.notebook.enabled }}
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: {{ include "redis-notebook.fullname" . }}-notebook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redis-notebook.labels" . | nindent 4 }}
    app.kubernetes.io/component: notebook
    opendatahub.io/dashboard: "true"
    opendatahub.io/odh-managed: "true"
  annotations:
    notebooks.opendatahub.io/inject-auth: "true"
    opendatahub.io/username: {{ .Values.notebook.username | default "admin" | quote }}
    helm.sh/hook-weight: "0"
spec:
  template:
    spec:
      serviceAccountName: {{ include "redis-notebook.serviceAccountName" . }}
      containers:
        - name: {{ include "redis-notebook.fullname" . }}-notebook
          image: {{ .Values.notebook.image.repository }}:{{ .Values.notebook.image.tag }}
          imagePullPolicy: {{ .Values.notebook.image.pullPolicy }}
          workingDir: /opt/app-root/src
          env:
            - name: NOTEBOOK_ARGS
              value: >-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/{{ .Release.Namespace }}/{{ include "redis-notebook.fullname" . }}-notebook
                --ServerApp.quit_button=False
            - name: RESTARTABLE
              value: "yes"
            - name: JUPYTER_IMAGE
              value: {{ .Values.notebook.image.repository }}:{{ .Values.notebook.image.tag }}
            - name: JUPYTER_RUNTIME_DIR
              value: /opt/app-root/src/.jupyter/runtime
            - name: JUPYTER_DATA_DIR
              value: /opt/app-root/src/.jupyter/data
            - name: JUPYTER_CONFIG_DIR
              value: /opt/app-root/src/.jupyter/config
            - name: IPYTHONDIR
              value: /opt/app-root/src/.ipython
            - name: HOME
              value: /opt/app-root/src
            - name: CONDARC
              value: /opt/app-root/src/.condarc
            - name: MODEL_API_KEY
              value: {{ .Values.secrets.model.apiKey | quote }}
            - name: MODEL_ENDPOINT
              value: {{ .Values.secrets.model.endpoint | quote }}
            - name: SIMPLE_MODEL_ENDPOINT
              value: {{ .Values.secrets.model.simpleEndpoint | default .Values.secrets.model.endpoint | quote }}
            - name: COMPLEX_MODEL_ENDPOINT
              value: {{ .Values.secrets.model.complexEndpoint | default .Values.secrets.model.endpoint | quote }}
            - name: SIMPLE_MODEL_KEY
              value: {{ .Values.secrets.model.simpleApiKey | default .Values.secrets.model.apiKey | quote }}
            - name: COMPLEX_MODEL_KEY
              value: {{ .Values.secrets.model.complexApiKey | default .Values.secrets.model.apiKey | quote }}
            - name: COMPLEX_MODEL_NAME
              value: {{ .Values.secrets.model.complexModelName | quote }}
            - name: SIMPLE_MODEL_NAME
              value: {{ .Values.secrets.model.simpleModelName | quote }}
            - name: REDIS_URL
              value: {{ include "redis-notebook.redisUrl" . | quote }}
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          resources:
            limits:
              cpu: {{ .Values.notebook.resources.limits.cpu | quote }}
              memory: {{ .Values.notebook.resources.limits.memory | quote }}
            requests:
              cpu: {{ .Values.notebook.resources.requests.cpu | quote }}
              memory: {{ .Values.notebook.resources.requests.memory | quote }}
          startupProbe:
            httpGet:
              scheme: HTTP
              path: /notebook/{{ .Release.Namespace }}/{{ include "redis-notebook.fullname" . }}-notebook/api
              port: notebook-port
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 60
          livenessProbe:
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
            httpGet:
              scheme: HTTP
              path: /notebook/{{ .Release.Namespace }}/{{ include "redis-notebook.fullname" . }}-notebook/api
              port: notebook-port
          readinessProbe:
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
            httpGet:
              scheme: HTTP
              path: /notebook/{{ .Release.Namespace }}/{{ include "redis-notebook.fullname" . }}-notebook/api
              port: notebook-port
          volumeMounts:
            - name: workspace
              mountPath: /opt/app-root/src
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "redis-notebook.fullname" . }}-notebook-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
{{- end }}
