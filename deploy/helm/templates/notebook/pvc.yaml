{{- if .Values.notebook.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "redis-notebook.fullname" . }}-notebook-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redis-notebook.labels" . | nindent 4 }}
    app.kubernetes.io/component: notebook
    opendatahub.io/dashboard: "true"
  annotations:
    openshift.io/display-name: "Redis AI cost reduction — notebook workspace"
    helm.sh/hook-weight: "-5"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.notebook.storage.size }}
  {{- with .Values.notebook.storage.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
