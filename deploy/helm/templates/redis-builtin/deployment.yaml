{{- if and .Values.redis.builtin.enabled (not .Values.redis.useOtContainerKitOperator) (not .Values.redis.useRedisEnterpriseOperator) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "redis-notebook.redisBuiltinName" . }}
  labels:
    {{- include "redis-notebook.redisBuiltinLabels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: {{ if .Values.redis.builtin.persistence.enabled }}Recreate{{ else }}RollingUpdate{{ end }}
  selector:
    matchLabels:
      {{- include "redis-notebook.redisBuiltinSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "redis-notebook.redisBuiltinSelectorLabels" . | nindent 8 }}
      {{- with .Values.redis.builtin.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.redis.builtin.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: "{{ .Values.redis.builtin.image.repository }}:{{ .Values.redis.builtin.image.tag }}"
          imagePullPolicy: {{ .Values.redis.builtin.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: {{ .Values.redis.builtin.service.port }}
              protocol: TCP
          {{- with .Values.redis.builtin.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.redis.builtin.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.redis.builtin.resources | nindent 12 }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: redis-data
          {{- if .Values.redis.builtin.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "redis-notebook.redisBuiltinName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
